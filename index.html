<!DOCTYPE html>
<html lang="ar" dir="rtl" id="htmlPage">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مدارس ليسيه الهرم | Lycée El-Haram Schools</title>
    <style>
        /* --- Ancient Pharaonic Cyberpunk Theme --- */
        :root {
            --gold: #d4af37;
            --lapis: #0033a0;
            --sand: #f4e4bc;
            --glass: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

        body {
            background: linear-gradient(135deg, #1a1a2e, #0f2027);
            color: #fff;
            min-height: 100vh;
        }

        /* Full Background */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('pyramids.png') center/cover no-repeat;
            opacity: 0.3; /* Full visibility with a hint of tint */
            z-index: -1;
        }

        /* Modern Glassmorphism Header */
        header {
            background: rgba(0, 51, 160, 0.2);
            backdrop-filter: blur(20px);
            border-bottom: 2px solid var(--gold);
            padding: 10px 40px;
            position: sticky; top: 0; z-index: 1000;
        }

        .navbar { display: flex; justify-content: space-between; align-items: center; max-width: 1300px; margin: 0 auto; }

        .nav-links a {
            color: var(--sand);
            text-decoration: none;
            padding: 10px 20px;
            border: 1px solid transparent;
            transition: 0.4s;
            cursor: pointer;
        }

        .nav-links a:hover, .active-tab {
            border: 1px solid var(--gold);
            background: rgba(212, 175, 55, 0.2);
            color: white;
        }

        /* Sections */
        .page-section { display: none; padding: 100px 20px; max-width: 1000px; margin: 0 auto; }
        .active-section { display: block; }

        .hero-banner {
            border: 2px solid var(--gold);
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,51,160,0.4));
            padding: 60px;
            text-align: center;
            border-radius: 20px;
        }

        .about-box, .placeholder-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(212, 175, 55, 0.3);
        }

        /* Buttons */
        .btn-signup { background: var(--gold); color: #000; padding: 10px 20px; border-radius: 5px; border: none; font-weight: bold; }
        .btn-login { background: transparent; border: 1px solid var(--gold); color: var(--gold); padding: 10px 20px; border-radius: 5px; }

        /* Modals */
        .modal-overlay { background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); }
        .modal-card { background: #1a1a2e; border: 2px solid var(--gold); color: #fff; padding: 40px; }
        input { background: #0f2027; border: 1px solid var(--gold); color: #fff; padding: 10px; width: 100%; margin: 10px 0; }
        
        @media (max-width: 900px) { .nav-links { background: #000; padding: 20px; } }
    </style>
</head>
<body>

    <!-- Header -->
    <header>
        <div class="navbar">
            <div class="logo-container" onclick="showSection('home')">
                <span style="font-weight:bold; color:var(--gold); font-size:24px;">Lycée El-Haram 3000</span>
            </div>
            <ul class="nav-links" id="navLinksMenu">
                <li><a id="tab-home" class="active-tab" onclick="showSection('home')">الرئيسية</a></li>
                <li><a id="tab-about" onclick="showSection('about')">من نحن</a></li>
                <li><a id="tab-contact" onclick="showSection('contact')">اتصل بنا</a></li>
            </ul>
            <div class="auth-buttons">
                <button class="btn-login" onclick="toggleModal('loginModal', true)">دخول</button>
                <button class="btn-signup" onclick="toggleModal('signupModal', true)">تسجيل</button>
            </div>
        </div>
    </header>

    <section id="sec-home" class="page-section active-section">
        <div class="hero-banner">
            <h1>مرحباً بكم في مدارس ليسيه الهرم</h1>
            <p>مستقبل التعليم من قلب التاريخ</p>
        </div>
    </section>

    <!-- (Keep the rest of your HTML/JS content same as before) -->

    <script>
        function showSection(sectionId) {
            document.querySelectorAll('.page-section').forEach(sec => sec.classList.remove('active-section'));
            document.getElementById('sec-' + sectionId).classList.add('active-section');
        }
        function toggleModal(modalId, isShow) {
            document.getElementById(modalId).style.display = isShow ? 'flex' : 'none';
        }
    </script>
</body>
</html>
